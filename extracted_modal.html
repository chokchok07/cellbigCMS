<!-- New Version Modal -->
<div id="newVersionModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center; padding:20px;">
<div style="background:#fff; width:600px; max-width:100%; max-height:90vh; border-radius:8px; display:flex; flex-direction:column; overflow:hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);">
<!-- Modal Header -->
<div style="padding:16px 20px; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; align-items:center; background:#f9fafb;">
<h3 style="margin:0; font-size:18px; color:#111827;">새 버전 업로드 (+ New Version)</h3>
<button onclick="closeNewVersionModal()" style="background:transparent; border:none; font-size:24px; cursor:pointer; color:#6b7280;" type="button">×</button>
</div>
<!-- Modal Body -->
<div style="padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:24px;">
<!-- 버전 -->
<div>
<label style="display:block; margin-bottom:8px; font-weight:600; color:#374151; font-size:14px;">버전 (Version)</label>
<div style="display:flex; align-items:center; gap:8px;">
<input id="versionMajor" max="999" min="0" style="width:70px; padding:8px 12px; border:1px solid #d1d5db; border-radius:4px; text-align:center;" type="number" value="1"/>
<span style="font-weight:bold; color:#6b7280;">.</span>
<input id="versionMinor" max="999" min="0" style="width:70px; padding:8px 12px; border:1px solid #d1d5db; border-radius:4px; text-align:center;" type="number" value="4"/>
<span style="font-weight:bold; color:#6b7280;">.</span>
<input id="versionPatch" max="999" min="0" style="width:70px; padding:8px 12px; border:1px solid #d1d5db; border-radius:4px; text-align:center;" type="number" value="0"/>
</div>
</div>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
<!-- 업데이트 타입 -->
<div>
<label style="display:block; margin-bottom:8px; font-weight:600; color:#374151; font-size:14px;">업데이트 유형</label>
<div style="display:flex; gap:16px;">
<label for="updateForced" style="display:flex; align-items:center; gap:6px; cursor:pointer;">
<input id="updateForced" name="updateType" style="width:16px; height:16px;" type="radio" value="forced"/>
<span style="font-size:13px;">강제 업데이트</span>
</label>
<label for="updateOptional" style="display:flex; align-items:center; gap:6px; cursor:pointer;">
<input checked="" id="updateOptional" name="updateType" style="width:16px; height:16px;" type="radio" value="optional"/>
<span style="font-size:13px;">선택 업데이트</span>
</label>
</div>
</div>
<!-- 배포 환경 -->
<div>
<label style="display:block; margin-bottom:8px; font-weight:600; color:#374151; font-size:14px;">배포 환경</label>
<div style="display:flex; gap:16px;">
<label for="deployProduction" style="display:flex; align-items:center; gap:6px; cursor:pointer;">
<input id="deployProduction" name="deploymentTarget" style="width:16px; height:16px;" type="radio" value="production"/>
<span style="font-size:13px;">상용 (Production)</span>
</label>
<label for="deployTest" style="display:flex; align-items:center; gap:6px; cursor:pointer;">
<input checked="" id="deployTest" name="deploymentTarget" style="width:16px; height:16px;" type="radio" value="test"/>
<span style="font-size:13px;">테스트 (Test)</span>
</label>
</div>
</div>
</div>
<!-- 버전 파일 및 확인 -->
<div>
<label style="display:block; margin-bottom:8px; font-weight:600; color:#374151; font-size:14px;">버전 파일 (Artifact File)</label>
<div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
<div id="newVersionFileName" style="flex:1; padding:8px 12px; border:1px solid #d1d5db; border-radius:4px; background:#f9fafb; font-size:13px; color:#6b7280;">파일을 선택해 주세요.</div>
<input accept=".zip" id="newVersionFile" onchange="handleNewVersionFileSelect(event)" style="display:none" type="file"/>
<button class="btn btn-outline" onclick="document.getElementById('newVersionFile').click()" style="padding:8px 16px; font-size:13px;" type="button">파일 찾기</button>
</div>
<div style="display:flex; gap:12px; align-items:center; font-size:13px;">
<div style="background:#f3f4f6; padding:6px 12px; border-radius:4px; flex:1;">
<strong>파일 크기:</strong> <span id="newVersionFileSize">0 MB</span>
</div>
<button class="btn" disabled="" id="verifyFileBtn" onclick="alert('파일 확인 완료!')" style="padding:6px 12px; background:#10b981; color:white; border:none; border-radius:4px; cursor:not-allowed; opacity:0.6;" type="button">파일 확인 (Verify)</button>
</div>
</div>
<!-- 상태 -->
<div>
<label style="display:block; margin-bottom:8px; font-weight:600; color:#374151; font-size:14px;">상태 (Status)</label>
<div style="display:flex; gap:20px; padding:12px; background:#f9fafb; border:1px solid #e5e7eb; border-radius:6px; align-items:center;">
<label for="stateDraft" style="display:flex; align-items:center; gap:6px; cursor:pointer;">
<input checked="" id="stateDraft" name="versionState" style="width:16px; height:16px;" type="radio" value="draft"/>
<span style="font-size:14px; font-weight:600; color:#4b5563;">Draft (초안)</span>
</label>
<label for="stateStaged" style="display:flex; align-items:center; gap:6px; cursor:pointer;">
<input id="stateStaged" name="versionState" style="width:16px; height:16px;" type="radio" value="staged"/>
<span style="font-size:14px; font-weight:600; color:#047857;">Staged (테스트)</span>
</label>
<label for="statePublished" style="display:flex; align-items:center; gap:6px; cursor:pointer;">
<input id="statePublished" name="versionState" style="width:16px; height:16px;" type="radio" value="published"/>
<span style="font-size:14px; font-weight:600; color:#1d4ed8;">Published (발행)</span>
</label>
</div>
<div style="font-size:12px; color:#6b7280; margin-top:6px;">새 버전을 업로드 시 기본 상태는 'Draft(초안)'이며, 의도치 않은 상용 배포를 방지합니다.</div>
</div>
<!-- 버전 설명 -->
<div>
<label style="display:block; margin-bottom:8px; font-weight:600; color:#374151; font-size:14px;">버전 설명 (Release Notes)</label>
<textarea id="releaseNotes" placeholder="변경 사항 및 배포 노트를 입력하세요." style="width:100%; min-height:100px; padding:12px; border:1px solid #d1d5db; border-radius:4px; font-family:inherit; font-size:13px; resize:vertical;"></textarea>
</div>
</div>
<!-- Modal Footer -->
<div style="padding:16px 20px; border-top:1px solid #e5e7eb; display:flex; justify-content:flex-end; gap:10px; background:#f9fafb;">
<button class="btn btn-secondary" onclick="closeNewVersionModal()" type="button">취소</button>
<button class="btn btn-primary" onclick="submitNewVersion()" type="button">버전 등록</button>
</div>
</div>
</div>
