<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - CellbigCMS</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      margin: 0;
      font-size: 28px;
      color: #1f2937;
      font-weight: 700;
    }

    .login-header p {
      margin: 8px 0 0;
      font-size: 14px;
      color: #6b7280;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 14px;
      line-height: inherit;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      border-width: 2px;
      padding: 9px 11px;
    }

    .login-button {
      width: 100%;
      padding: 12px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.2s;
    }

    .login-button:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <h1>CellbigCMS</h1>
      <p>관리자 시스템 로그인</p>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">아이디 (이메일)</label>
        <input type="text" id="username" placeholder="admin@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="login-button">로그인</button>
      <div style="margin-top: 16px; text-align: center; font-size: 14px;">
        <span style="color: #6b7280;">계정이 없으신가요?</span>
        <a href="register.html" style="color: #2563eb; text-decoration: none; font-weight: 500; margin-left: 4px;">회원가입</a>
      </div>
    </form>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault(); // 기본 폼 제출 방지
      // 실제 로그인 검증 로직이 들어갈 자리 (프로토타입이므로 생략)
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
