<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - CellbigCMS</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      width: 100%;
      max-width: 480px;
      margin: 40px 10px;
      box-sizing: border-box;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      margin: 0;
      font-size: 28px;
      color: #1f2937;
      font-weight: 700;
    }

    .login-header p {
      margin: 8px 0 0;
      font-size: 14px;
      color: #6b7280;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-inline-group {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .form-inline-group .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 14px;
      line-height: inherit;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      border-width: 2px;
      padding: 9px 11px;
    }

    .login-button {
      width: 100%;
      padding: 12px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.2s;
    }

    .login-button:hover {
      background-color: #1d4ed8;
    }

    .notice-box {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 16px;
      margin-top: 24px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #475569;
      line-height: 1.5;
    }

    .notice-box strong {
      display: block;
      color: #1e293b;
      margin-bottom: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <h1>CellbigCMS</h1>
      <p>관리자 계정 회원가입</p>
    </div>

    <form onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="email">이메일 (아이디)</label>
        <input type="email" id="email" placeholder="admin@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="form-group">
        <label for="company">회사/소속</label>
        <input type="text" id="company" placeholder="(주)셀빅" required>
      </div>

      <div class="form-inline-group">
        <div class="form-group">
          <label for="name">이름</label>
          <input type="text" id="name" placeholder="홍길동" required>
        </div>
        <div class="form-group">
          <label for="phone">전화번호</label>
          <input type="tel" id="phone" placeholder="010-0000-0000" required>
        </div>
      </div>

      <div class="notice-box">
        <strong>승인 요청 안내</strong>
        가입 정보 제출 후 관리자가 계정을 <b>승인</b>해야 관리자 시스템을 정상적으로 이용하실 수 있습니다. 가입 완료 시 관리자에게 검토가 요청됩니다.
      </div>

      <button type="submit" class="login-button">승인 요청</button>
      
      <div style="margin-top: 20px; text-align: center; font-size: 14px;">
        <span style="color: #6b7280;">이미 계정이 있으신가요?</span>
        <a href="login.html" style="color: #2563eb; text-decoration: none; font-weight: 500; margin-left: 4px;">로그인으로 이동</a>
      </div>
    </form>
  </div>

  <script>
    function handleRegister(event) {
      event.preventDefault();
      alert("회원가입 및 승인 요청이 완료되었습니다.\n관리자의 승인 완료 후 로그인할 수 있습니다.");
      window.location.href = 'login.html';
    }
  </script>

</body>
</html>
